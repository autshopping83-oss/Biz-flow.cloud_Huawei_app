name: Build Huawei AppGallery AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-huawei-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/bizflow-android.keystore

      - name: Write agconnect-services.json from secret
        env:
          AGCONNECT_JSON: ${{ secrets.AGCONNECT_SERVICES_JSON }}
        run: |
          echo "$AGCONNECT_JSON" > android/app/agconnect-services.json

      - name: Build AAB Release (assinado + HMS)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon \
            -PstorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}"

      - name: Upload AAB (Huawei)
        uses: actions/upload-artifact@v4
        with:
          name: app-huawei-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
