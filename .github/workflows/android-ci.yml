name: Android CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # Atualizado para v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci # Mais rápido e seguro para CI

      - name: Build Web Project
        # Substitua pelo seu comando de build real (ex: npm run build)
        # O Capacitor precisa dos assets compilados na pasta 'dist' ou 'www'
        run: npm run build 

      - name: Capacitor Sync
        # CRUCIAL: Isso gera o arquivo cordova.variables.gradle que está faltando
        run: npx cap sync android

      - name: Build and sign AAB
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
          # Certifique-se de que seu build.gradle está configurado para ler estas variáveis:
          # MYAPP_RELEASE_STORE_PASSWORD, etc.
        run: |
          cd android
          echo $ENCODED_KEYSTORE | base64 -d > app/bizflow.keystore
          ./gradlew bundleRelease
          
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          
