
<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="Faturas, Recibos e Orçamentos em PDF. Gestão simples e profissional.">
    
    <!-- PWA & MOBILE ICONS -->
    <link rel="icon" type="image/png" href="/android-launchericon-192-192.png" />
    <link rel="apple-touch-icon" href="/android-launchericon-192-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Biz-flow">

    <title>Biz-flow.cloud | Gestão de Negócios</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            animation: { fadeIn: 'fadeIn 0.3s ease-out forwards', slideUp: 'slideUp 0.4s ease-out forwards', scaleIn: 'scaleIn 0.3s ease-out forwards' },
            keyframes: { 
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
              scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root">
      <!-- CONTEÚDO INICIAL (SPLASH SCREEN) -->
      <!-- Isso aparece IMEDIATAMENTE enquanto o JS baixa e processa -->
      <div id="app-splash">
         <svg class="splash-logo" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="splash_grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#38bdf8" />
                <stop offset="100%" stop-color="#2563EB" />
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#splash_grad)" />
            <path d="M110 160 H 402" stroke="white" stroke-width="45" stroke-linecap="round" />
            <path d="M110 266 H 402" stroke="white" stroke-width="45" stroke-linecap="round" opacity="0.85" />
            <path d="M110 372 H 260" stroke="white" stroke-width="45" stroke-linecap="round" opacity="0.7" />
            <circle cx="382" cy="382" r="90" fill="white" />
            <g transform="translate(382, 382) scale(0.9)">
                <path d="M-25 25 L35 -35" stroke="#2563EB" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M-15 -35 H35 V15" stroke="#2563EB" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" />
            </g>
         </svg>
         <div class="splash-loader"></div>
         <p style="margin-top: 20px; font-size: 14px; font-weight: 600; color: #64748B; letter-spacing: 0.05em;">Biz-Flow</p>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
